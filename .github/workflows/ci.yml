name: Automated Code Review

on:
  pull_request:
    branches: [ main ]

jobs:
  review:
    runs-on: ubuntu-latest
    # Cấp quyền cho bot được ghi comment vào PR
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        # Chạy checkstyle và bỏ qua lỗi để bước sau có thể đọc file xml báo cáo
        run: mvn checkstyle:checkstyle -Dcheckstyle.failOnViolation=false

      - name: Checkstyle Inline Feedback
        uses: dbelyaev/action-checkstyle@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          checkstyle_config: google_checks.xml
          # Đường dẫn tới file xml mà maven xuất ra
          reporter: github-pr-review
          level: warning

      - name: Final Build & Test Verify
        # Bước này sẽ thực sự làm fail build nếu code coverage thấp hoặc lỗi logic
        run: mvn clean verify